<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - Tripzy OTP</title>

  <!-- Fonts & Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" />

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
    }
    body, html {
      height: 100%;
      width: 100%;
    }
    section {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;
      background-image: url("955115.jpg");
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
    }
    #sectionbox {
      width: 90%;
      height: 90vh;
      border: 1px solid white;
      border-radius: 20px;
      background: linear-gradient(transparent 50%, rgb(1, 119, 165));
      backdrop-filter: blur(10px);
      position: relative;
    }
    header {
      padding: 20px 30px;
    }
    #navitems {
      font-size: 18px;
      font-weight: 789;
      text-decoration: none;
      color: white;
      text-shadow: 2px 2px 7px #000;
      padding: 5px 10px;
      border-radius: 10px;
      transition: 0.2s ease-in-out;
    }
    #navitems:hover{
        background-color: #cccccc7e;
    }
    .earth, .leaf, .leafy, .anni {
      position: absolute;
    }
    .earth {
      left: 160px;
      width: 500px;
      animation: earth 120s linear infinite;
    }
    .leaf {
        z-index: 9;
      width: 400px;
      bottom: 30px;
    }
    .leaf:hover {
      scale: 1.1;
    }
    .leafy {
      width: 250px;
      top: 20px;
      left: 60px;
      filter: blur(3px);
    }
    .anni {
      bottom: 0px;
      left: 600px;
      width: 200px;
    }
    .texty {
      position: absolute;
      bottom: 30px;
      left: 160px;
      background-color: #fff;
      width: 500px;
      padding-left: 10px;
      border-radius: 10px;
      z-index: -1;
    }

    
    .loginbox {
      position: absolute;
      right: 80px;
      
      top: 110px;
    }
    .login-container {
      background: linear-gradient(#6dc5c562);
      padding: 2rem;
      border-radius: 8px;
      width: 400px;
      border: 1px solid white;
    }
    .login-container h2 {
      color: rgb(239, 244, 239);
      margin-bottom: 1.5rem;
      text-align: center;
    }
    input[type="email"] {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 0.8rem;
      background-color: transparent;
      border: 1px solid white;
      color: white;
      border-radius: 4px;
    }
    input::placeholder {
      color: rgb(255, 255, 255);
      opacity: 1;
    }

    #otp-inputs {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 15px;
    }
    .otp-box {
      width: 40px;
      height: 45px;
      font-size: 24px;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: white;
    }

    .logbtn {
      width: 150px;
      padding: 0.8rem;
      background: linear-gradient(to right, rgb(29, 215, 221), rgb(41, 134, 201));
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 900;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .logbtn:hover {
      background: white;
      color: black;
    }

    .timer {
      font-size: 0.9rem;
      color: #fff;
      text-align: center;
      margin-bottom: 10px;
    }

    @keyframes earth {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
<section>
  <div id="sectionbox">
    <header>
      <a id="navitems" href="frontpage.html"><i class="fas fa-home"></i> Home</a>
    </header>

    <img src="flight.png" class="leaf">
    <img src="jack.png" class="anni">
    <img src="earth.png" class="earth">
    <img src="flight2.png" class="leafy">
    <h3 class="texty">Welcome back..! Please login to continue 🛫</h3>

    <div class="loginbox">
      <div class="login-container">
        <h2>Login with OTP</h2>
        <form id="otpForm">
          <input type="email" id="email" placeholder="Enter your Gmail" class="form-control" required />
          
          <div id="otp-inputs">
            <input type="text" maxlength="1" class="otp-box" required />
            <input type="text" maxlength="1" class="otp-box" required />
            <input type="text" maxlength="1" class="otp-box" required />
            <input type="text" maxlength="1" class="otp-box" required />
            <input type="text" maxlength="1" class="otp-box" required />
            <input type="text" maxlength="1" class="otp-box" required />
          </div>

          <div class="timer" id="timerDisplay"></div>

          <div style="text-align:center;">
            <button type="button" onclick="sendOTP()" class="logbtn">Send OTP</button><br />
            <button type="submit" class="logbtn">Verify</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- Firebase Config -->
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAGuOP8cLH8u64-w2bNPRYbLLUZtGPkhHA",
    authDomain: "lifepulse-b9929.firebaseapp.com",
    projectId: "lifepulse-b9929",
    storageBucket: "lifepulse-b9929.appspot.com",
    messagingSenderId: "567842060264",
    appId: "1:567842060264:web:8a7101587b78b66423965d"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<script>
  emailjs.init("oiV6cErvPxQxgH9uZ");

  let generatedOTP = "";
  let timer;
  let timeLeft = 60;

  function sendOTP() {
    const email = document.getElementById("email").value.trim();
    if (!email.endsWith("@gmail.com")) {
      alert("Please enter a valid Gmail address.");
      return;
    }

    generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
    const expiry = new Date(Date.now() + 15 * 60000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const params = {
      email: email,
      passcode: generatedOTP,
      time: expiry
    };

    emailjs.send("service_8gqu4hs", "template_gngirc5", params)
      .then(() => {
        alert("OTP sent successfully.");
        startTimer();
      })
      .catch((error) => {
        alert("Error sending OTP: " + error.text);
      });
  }

  function startTimer() {
    document.getElementById("timerDisplay").innerText = `Resend available in 60s`;
    timeLeft = 60;
    clearInterval(timer);
    timer = setInterval(() => {
      timeLeft--;
      document.getElementById("timerDisplay").innerText = `Resend available in ${timeLeft}s`;
      if (timeLeft <= 0) {
        clearInterval(timer);
        document.getElementById("timerDisplay").innerText = '';
      }
    }, 1000);
  }

  document.addEventListener("DOMContentLoaded", () => {
    const boxes = document.querySelectorAll(".otp-box");
    boxes.forEach((box, i) => {
      box.addEventListener("input", () => {
        box.value = box.value.replace(/\D/g, "");
        if (box.value && i < boxes.length - 1) {
          boxes[i + 1].focus();
        }
      });
      box.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !box.value && i > 0) {
          boxes[i - 1].focus();
        }
      });
    });

    document.getElementById("otpForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const enteredOTP = Array.from(boxes).map(box => box.value).join("");

      if (enteredOTP === generatedOTP) {
        sessionStorage.setItem("verifiedEmail", email);

        db.collection("users").where("email", "==", email).get()
          .then(snapshot => {
            if (!snapshot.empty) {
              alert("Welcome back! Redirecting to home...");
              window.location.href = "home.html";
            } else {
              alert("OTP Verified. Redirecting to registration...");
              window.location.href = "register.html";
            }
          })
          .catch(error => {
            console.error("Error checking user existence:", error);
            alert("Something went wrong. Please try again.");
          });
      } else {
        alert("Incorrect OTP. Please try again.");
      }
    });
  });
</script>
</body>
</html>
